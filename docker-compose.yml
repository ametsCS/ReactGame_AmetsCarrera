version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./BACKEND
    ports:
      - "4000:4000"
    env_file:
      - ./BACKEND/.env
      
